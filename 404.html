<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons@7/primeicons.css" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #0079AF;
        --primary-light: #0096D6;
        --accent: #2DD4BF;
        --surface-950: #0a0a0f;
        --surface-900: #111118;
        --surface-800: #1a1a24;
        --surface-700: #242430;
        --text-primary: #e8e6e3;
        --text-secondary: #9a9a8e;
        --text-muted: #6b6b5e;
        --border-color: rgba(255, 255, 255, 0.06);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --surface-950: #faf9f7;
          --surface-900: #f2f1ee;
          --surface-800: #eae9e5;
          --surface-700: #dddcd7;
          --text-primary: #1a1a18;
          --text-secondary: #5a5a52;
          --text-muted: #8a8a7e;
          --border-color: rgba(0, 0, 0, 0.08);
        }
      }

      body {
        background-color: var(--surface-950);
        color: var(--text-primary);
        font-family: 'JetBrains Mono', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        opacity: 0.04;
        background-image:
          linear-gradient(var(--border-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }

      .error-code {
        font-size: clamp(5rem, 15vw, 10rem);
        font-weight: 800;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
        animation: fade-in-up 0.6s ease-out both;
      }

      .terminal-box {
        background: var(--surface-900);
        border: 1px solid var(--surface-700);
        border-radius: 0;
        overflow: hidden;
        margin-bottom: 2rem;
        animation: fade-in-up 0.6s ease-out 0.1s both;
      }

      .terminal-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--surface-700);
      }

      .terminal-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .terminal-dot.red { background: rgba(239, 68, 68, 0.6); }
      .terminal-dot.yellow { background: rgba(234, 179, 8, 0.6); }
      .terminal-dot.green { background: rgba(34, 197, 94, 0.6); }

      .terminal-title {
        margin-left: 8px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .terminal-body {
        padding: 24px;
      }

      .terminal-body p {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 8px;
      }

      .terminal-body .cmd {
        color: var(--primary);
      }

      .terminal-body .path {
        color: var(--text-muted);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
        animation: fade-in-up 0.6s ease-out 0.2s both;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-light);
        box-shadow: 0 4px 20px rgba(0, 121, 175, 0.3);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: var(--surface-800);
        color: var(--text-secondary);
        border: 1px solid var(--surface-700);
        margin-left: 12px;
      }

      .btn-secondary:hover {
        color: var(--primary);
        border-color: rgba(0, 121, 175, 0.5);
        transform: translateY(-2px);
      }

      .cursor {
        display: inline-block;
        animation: blink 1s step-end infinite;
        color: var(--primary);
      }

      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @media (max-width: 480px) {
        .btn {
          display: flex;
          margin-left: 0 !important;
          margin-top: 8px;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="error-code">404</div>

      <div class="terminal-box">
        <div class="terminal-bar">
          <span class="terminal-dot red"></span>
          <span class="terminal-dot yellow"></span>
          <span class="terminal-dot green"></span>
          <span class="terminal-title">error.log</span>
        </div>
        <div class="terminal-body">
          <p><span class="cmd">$</span> <span class="path">cat</span> ./error.log</p>
          <p style="margin-top: 12px; color: var(--text-primary);">
            Page not found<span class="cursor">_</span>
          </p>
          <p style="margin-top: 8px; font-size: 12px;">
            The requested page does not exist or has been moved.
          </p>
        </div>
      </div>

      <div>
        <a href="/" class="btn btn-primary">
          <i class="pi pi-home"></i>
          Home
        </a>
        <a href="/#contacts" class="btn btn-secondary">
          <i class="pi pi-envelope"></i>
          Contact
        </a>
      </div>
    </div>
  </body>
</html>
